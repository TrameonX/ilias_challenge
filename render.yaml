# Blueprint Render : déploie l'app (API + UI + IA) en un service Docker.
# Sur Render : New → Blueprint → connecte le repo → choisis la branche → Deploy.
# Puis renseigne GROQ_API_KEY dans l'onglet Environment (secret).
services:
  - type: web
    name: ai-file-pipeline
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile
    plan: free
    envVars:
      - key: MODEL_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false   # secret : à saisir dans le dashboard Render

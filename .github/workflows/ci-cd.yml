# Pipeline CI/CD du challenge — GitHub Actions
# CI  : à chaque push / PR -> lance les tests + vérifie le build Docker
# CD  : sur la branche main -> déclenche le déploiement Render
name: CI/CD

on:
  push:
    branches: [ integration, main ]
  pull_request:

jobs:
  test:
    name: Tests (CI)
    runs-on: ubuntu-latest
    env:
      MODEL_PROVIDER: mock        # pas de clé API en CI : on teste avec le mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lancer les tests
        run: pytest tests -q

  docker-build:
    name: Build image Docker (CI)
    runs-on: ubuntu-latest
    needs: test                   # ne build que si les tests passent
    steps:
      - uses: actions/checkout@v4
      - name: Vérifier que l'image Docker se construit
        run: docker build -f deploy/Dockerfile -t ai-file-pipeline:ci .

  deploy:
    name: Déploiement Render (CD)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'   # CD uniquement sur main
    steps:
      - name: Déclencher le déploiement Render
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Secret RENDER_DEPLOY_HOOK_URL absent — étape ignorée."
          else
            curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "Déploiement Render déclenché."
          fi

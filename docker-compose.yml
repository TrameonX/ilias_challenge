# Lance toute la stack : docker compose up --build
# Ollama doit tourner en local sur le port 11434 (ollama serve)
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  ui:
    build: .
    ports:
      - "7860:7860"
    environment:
      - API_URL=http://api:8000
    command: python ui/app.py
    depends_on:
      - api
